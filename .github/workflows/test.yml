name: CMake CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Установка компилятора и зависимостей
        run: |
          sudo apt update
          sudo apt install -y g++-13 cmake libboost-system-dev libboost-container-dev

      - name: CMake конфигурация
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_CXX_STANDARD=20

      - name: Сборка
        run: |
          cd build
          make sys_prog_allctr_allctr_glbl_hp_tests
          make sys_prog_allctr_allctr_srtd_lst_tests
          make sys_prog_allctr_allctr_bndr_tgs_tests

      - name: Запуск тестов global heap
        run: |
          cd build
          ./allocator/allocator_global_heap/tests/sys_prog_allctr_allctr_glbl_hp_tests

      - name: Запуск тестов sorted list
        run: |
          cd build
          ./allocator/allocator_sorted_list/tests/sys_prog_allctr_allctr_srtd_lst_tests

      - name: Запуск тестов boundary tags
        run: |
          cd build
          ./allocator/allocator_boundary_tags/tests/sys_prog_allctr_allctr_bndr_tgs_tests

      #- name: Запуск тестов B-дерева
      #  run: |
      #    cd build
      #    ./associative_container/indexing_tree/b_tree/tests/sys_prog_assctv_cntnr_indxng_tr_b_tr_tests